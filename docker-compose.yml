version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: akalingua_postgres
    environment:
      POSTGRES_USER: akalingua
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: akalingua_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: akalingua_redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass localredispassword

volumes:
  postgres_data: