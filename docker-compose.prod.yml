services:
  # Runs .ts migrations using the build stage (has ts-node), then exits.
  migrate:
    build:
      context: .
      target: build
    env_file: .env
    command: npm run migrate
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .                     # default = runtime stage (prod deps, non-root)
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: akalingua
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: akalingua
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akalingua"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # ponytail: no password — not published to host, only reachable on the compose network.
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddydata:/data
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  caddydata:
